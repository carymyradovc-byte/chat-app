<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f1f3f4;
            font-family: Arial, sans-serif;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #202124;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #1669c1;
        }
    </style>

</head>
<body>

<div class="box">
    <h2>Menga yoz</h2>

    <input id="msg" placeholder="Xabar yoz...">
    <button onclick="send()">Yubor</button>
</div>

<script>
function send() {
    const message = document.getElementById("msg").value;

    fetch('/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
    });

    alert("Yuborildi!");
}
</script>

</body>
</html>
