<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            font-family: 'Roboto', Arial, sans-serif;
        }

        .container {
            width: 360px;
            padding: 40px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            text-align: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: 400;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px 12px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            outline: none;
        }

        input:focus {
            border: 2px solid #1a73e8;
        }

        label {
            position: absolute;
            left: 12px;
            top: 16px;
            background: white;
            padding: 0 4px;
            color: #5f6368;
            font-size: 16px;
            transition: 0.2s;
        }

        input:focus + label,
        input:not(:placeholder-shown) + label {
            top: -8px;
            font-size: 12px;
            color: #1a73e8;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #1a73e8;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #1669c1;
        }
    </style>

</head>
<body>

<div class="container">
    <div class="logo">Chat</div>
    <h2>Menga yoz</h2>

    <div class="input-group">
        <input id="msg" placeholder=" " required>
        <label>Xabar yoz...</label>
    </div>

    <button onclick="send()">Yubor</button>
</div>

<script>
function send() {
    const message = document.getElementById("msg").value;

    fetch('/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
    });

    alert("Yuborildi!");
}
</script>

</body>
</html>
