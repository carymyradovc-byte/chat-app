<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>💬 Xabar yoz</h2>
    <input id="msg" placeholder="Xabar yoz..." />
    <button onclick="send()">Yuborish</button>
</div>

<script>
function send() {
    fetch("/send", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: document.getElementById("msg").value
        })
    });
}
</script>

</body>
</html>
